<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 文案改写器 - 中文 AI 工具站</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; flex: 1; }
    .nav-bar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .nav-bar a {
      text-decoration: none; color: #555; font-size: 0.9rem;
      display: flex; align-items: center; gap: 4px;
    }
    .nav-bar a:hover { color: #1a73e8; }
    h1 { font-size: 1.5rem; color: #1a73e8; margin-bottom: 6px; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 24px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    label { display: block; font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; color: #444; }
    textarea {
      width: 100%; min-height: 140px; padding: 14px;
      border: 1.5px solid #e0e0e0; border-radius: 12px;
      font-size: 0.95rem; font-family: inherit;
      resize: vertical; transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.12); }
    textarea::placeholder { color: #b0b0b0; }
    .style-selector {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .style-option {
      position: relative;
    }
    .style-option input { position: absolute; opacity: 0; pointer-events: none; }
    .style-option label {
      display: inline-block;
      padding: 8px 20px;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      color: #555;
    }
    .style-option input:checked + label {
      background: #e8f0fe;
      border-color: #1a73e8;
      color: #1a73e8;
    }
    .style-option label:hover { border-color: #1a73e8; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 28px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-primary:disabled { background: #93b8f0; cursor: not-allowed; transform: none; }
    .btn-sm {
      padding: 6px 14px; font-size: 0.8rem; border-radius: 8px;
      background: #f0f0f0; color: #555; border: none; cursor: pointer;
    }
    .btn-sm:hover { background: #e0e0e0; }
    .btn-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .loading-spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-item {
      padding: 14px 16px;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    .result-item:last-child { margin-bottom: 0; }
    .result-item .num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #e8f0fe;
      color: #1a73e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .result-item .text { flex: 1; font-size: 0.93rem; line-height: 1.6; word-break: break-all; white-space: pre-wrap; }
    .result-item .copy-btn {
      flex-shrink: 0;
      padding: 5px 12px;
      border: none; border-radius: 6px;
      font-size: 0.78rem; cursor: pointer;
      background: #f0f0f0; color: #555;
      transition: background 0.2s;
    }
    .result-item .copy-btn:hover { background: #e0e0e0; }
    .result-item .copy-btn.copied { background: #34a853; color: #fff; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .empty-state {
      text-align: center; padding: 40px 0; color: #aaa; font-size: 0.9rem;
    }
    .error-msg {
      background: #fce8e6; color: #c5221f;
      padding: 12px 16px; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 12px;
    }
    #ad-slot {
      margin-top: 32px;
      min-height: 90px;
      background: #eee;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 0.85rem;
    }
    footer { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; }
    @media (max-width: 640px) {
      .container { padding: 24px 16px; }
      .card { padding: 20px; }
      h1 { font-size: 1.3rem; }
      .result-item { flex-wrap: wrap; }
      .result-item .copy-btn { margin-left: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <a href="index.html">← 返回首页</a>
    </nav>
    <h1>✍️ AI 文案改写器</h1>
    <p class="subtitle">选择风格，一键改写你的文案</p>

    <div class="card">
      <label for="input-text">原文案</label>
      <textarea id="input-text" placeholder="请输入需要改写的文案内容..."></textarea>
      <label style="margin-top: 16px;">改写风格</label>
      <div class="style-selector">
        <div class="style-option">
          <input type="radio" name="style" id="style-kouyu" value="口语化" checked>
          <label for="style-kouyu">🗣 口语化</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="style-formal" value="正式">
          <label for="style-formal">📄 正式</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="style-humor" value="幽默">
          <label for="style-humor">😂 幽默</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="style-concise" value="简洁">
          <label for="style-concise">✂️ 简洁</label>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="generate-btn" onclick="rewrite()">🔄 开始改写</button>
      </div>
    </div>

    <div class="card">
      <label>改写结果</label>
      <div id="result-area">
        <div class="empty-state" id="empty-state">点击上方按钮，AI 将为你生成 3 版改写结果</div>
      </div>
    </div>

    <div id="ad-slot">广告位预留</div>
  </div>
  <footer>&copy; 2026 中文 AI 工具站</footer>

  <script>
    const API_URL = "http://localhost:8866/api/";

    async function rewrite() {
      const text = document.getElementById("input-text").value.trim();
      if (!text) {
        alert("请输入需要改写的文案");
        return;
      }

      const styleEl = document.querySelector('input[name="style"]:checked');
      const style = styleEl ? styleEl.value : "口语化";

      const btn = document.getElementById("generate-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> 改写中...';

      const resultArea = document.getElementById("result-area");
      const emptyState = document.getElementById("empty-state");
      if (emptyState) emptyState.remove();
      const oldErr = resultArea.querySelector(".error-msg");
      if (oldErr) oldErr.remove();

      try {
        const resp = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "rewrite", text, style })
        });

        if (!resp.ok) {
          throw new Error(`服务器错误 ${resp.status}`);
        }

        const data = await resp.json();
        const results = data.results || data.data || data.rewrites || [];

        resultArea.querySelectorAll(".result-item").forEach(el => el.remove());

        if (results.length === 0) {
          resultArea.innerHTML += '<div class="empty-state">未生成结果，请重试</div>';
          return;
        }

        results.forEach((item, i) => {
          const div = document.createElement("div");
          div.className = "result-item";
          const content = typeof item === "string" ? item : (item.text || item.content || String(item));
          div.innerHTML = `
            <span class="num">${i + 1}</span>
            <span class="text">${escapeHtml(content)}</span>
            <button class="copy-btn" onclick="copyResult(this, '${escapeHtml(content).replace(/'/g, "\\'")}')">复制</button>
          `;
          resultArea.appendChild(div);
        });
      } catch (err) {
        const errDiv = document.createElement("div");
        errDiv.className = "error-msg";
        errDiv.textContent = "请求失败：" + err.message;
        resultArea.prepend(errDiv);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔄 开始改写';
      }
    }

    function copyResult(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "已复制";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "复制";
          btn.classList.remove("copied");
        }, 2000);
      }).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        btn.textContent = "已复制";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "复制";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
